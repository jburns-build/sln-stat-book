name: Update Stat Book

# Publishes to GitHub Pages:
#   /        -> SLN stat book        (refreshed every run — fast)
#   /ndl/    -> NDL stat book        (refreshed every run — fast)
#   /records/-> career records page  (career totals re-fetched once a day)
#
# The stat book is what needs to be near-real-time, so every run refreshes the
# live rosters and rebuilds it. Career totals barely move game-to-game and are
# EXPENSIVE to fetch, so they're only re-pulled once a day (08:00-11:59 UTC) or
# when you tick "full_records" on a manual run; every other run rebuilds the
# records page instantly from the committed cache. That keeps the manual Refresh
# button and the frequent auto-refreshes fast.
on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours (UTC)
  workflow_dispatch:
    inputs:
      full_records:
        description: "Also re-fetch career records (slower)"
        type: boolean
        default: false

permissions:
  contents: write            # needed to commit the refreshed career cache
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25   # abort a network-stuck runner instead of hanging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Decide career-records mode
        id: mode
        run: |
          hour=$(date -u +%H)
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$hour" -ge 08 ] && [ "$hour" -lt 12 ]; then
            echo "careers=full" >> "$GITHUB_OUTPUT"      # once-a-day full refresh
          elif [ "${{ github.event.inputs.full_records }}" = "true" ]; then
            echo "careers=full" >> "$GITHUB_OUTPUT"      # manual override
          else
            echo "careers=cache" >> "$GITHUB_OUTPUT"     # fast: rebuild from cache
          fi
          echo "career mode: $(grep careers= "$GITHUB_OUTPUT")"

      - name: Refresh live seasons (fast)
        run: |
          python3 scripts/scrape_rosters_gap.py    # force-refreshes the live SLN season
          python3 scripts/scrape_awards.py
          python3 scripts/scrape_playoffs.py
          python3 scripts/scrape_ndl.py            # NDL: current season only (no history exists)
          python3 scripts/scrape_allstar.py        # all-star appearances (per-season box scores)
          python3 scripts/build_players_dataset.py
          python3 scripts/build_players_dataset.py --league ndl

      - name: Career records
        env:
          CAREERS_BUDGET_SECONDS: "720"   # cap fetch time; fall back to cache past it
        run: |
          if [ "${{ steps.mode.outputs.careers }}" = "full" ]; then
            echo "full career refresh (re-fetch active players; 12-min fetch budget)"
            python3 scripts/scrape_careers.py
          else
            echo "cache-only career build (no fetch)"
            python3 scripts/scrape_careers.py --cache-only
          fi

      - name: Persist refreshed career cache
        if: steps.mode.outputs.careers == 'full'
        run: |
          if ! git diff --quiet -- data/careers.json; then
            git config user.name "statbook-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/careers.json
            git commit -m "auto: refresh career cache"
            git push
          else
            echo "career cache unchanged"
          fi

      - name: Build pages
        run: |
          python3 scripts/build_site.py
          python3 scripts/build_site.py --league ndl
          python3 scripts/build_records.py
          python3 scripts/build_teams.py         # franchise records — pure compute, no fetch

      - name: Sanity check the build before publishing
        run: |
          python3 - <<'PY'
          import json, sys

          def check(path, league, need_games):
              d = json.load(open(path))
              cur = [p for p in d["players"] if p["season"] == "current"]
              teams = {p["team"] for p in cur}
              played = sum(1 for p in cur if p["g"])
              print(f"[{league}] live season: {len(cur)} players, {len(teams)} teams, "
                    f"{played} with games, {len(d['players'])} total rows")
              if len(teams) < 25 or len(cur) < 200:
                  sys.exit(f"ERROR: {league} live season looks incomplete — refusing to publish.")
              if need_games and played < 50:
                  sys.exit(f"ERROR: {league} live season has almost no game data — refusing to publish.")
              return d

          sln = check("out/players_dataset.json", "sln", need_games=True)
          if len(sln["players"]) < 15000:
              sys.exit(f"ERROR: SLN only {len(sln['players'])} total rows — refusing to publish.")
          # The NDL season may legitimately not have started yet, so games aren't required.
          check("out/ndl_players_dataset.json", "ndl", need_games=False)
          allstar = json.load(open("out/allstar.json"))["appearances"]
          print(f"[records] {len(allstar)} all-star appearances")
          if len(allstar) < 400:
              sys.exit("ERROR: all-star data looks incomplete — refusing to publish.")
          careers = json.load(open("out/careers_dataset.json"))["careers"]
          act = sum(1 for c in careers if c.get("active"))
          print(f"[records] {len(careers)} careers, {act} active")
          if len(careers) < 1500 or act < 200:
              sys.exit("ERROR: career records look incomplete — refusing to publish.")
          print("sanity check passed")
          PY

      - name: Stage site
        run: |
          mkdir -p _site/ndl _site/records _site/teams
          cp out/sln_stats.html _site/index.html
          cp out/ndl_stats.html _site/ndl/index.html
          cp out/records.html _site/records/index.html
          cp out/teams.html _site/teams/index.html
          echo "slnstatbook.com" > _site/CNAME   # keep the custom domain on every deploy
          ls -la _site _site/ndl _site/records _site/teams

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
